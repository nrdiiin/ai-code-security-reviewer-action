name: Custom Configuration

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run AI Code Security Reviewer
        uses: nrdiiin/ai-code-security-reviewer-action@v1
        with:
          path: "src/"
          fail-on: "medium"
          ignore: "**/test/**,**/vendor/**,**/*.test.js"
          comment-pr: "true"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
