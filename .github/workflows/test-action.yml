name: Test Action

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # Unit tests for the Python scripts
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest ruff

      - name: Run ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v

  # Dogfooding: run the action itself against this repo
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run AI Code Security Reviewer (self-scan)
        uses: ./
        with:
          path: "scripts/"
          fail-on: "critical"
          comment-pr: "true"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
